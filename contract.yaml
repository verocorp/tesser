# tesser behavior contract — spec-as-data (D5/5A)
#
# Tests pin against this file: tests/structure.test.ts reads the clause list
# and asserts SKILL.md contains the literal anchor `contract:<id>` for every
# clause. Change a clause only with a matching build-contract decision
# (see CLAUDE.md for where the decision record lives).

version: 1

# SKILL.md must contain this literal string for each clause below.
anchor_format: "contract:<id>"

# Byte budget for SKILL.md, pinned here so the test reads it as data. SKILL.md is
# the main-thread router + dev-facing output contract + build path; the grounding
# machinery moved to subagent-brief.md (read by the background subagent in its own
# context), which carries its own, looser budget.
skill_md:
  max_bytes: 16384
subagent_brief:
  max_bytes: 12288

clauses:
  - id: cited-claims
    delta: true # value-over-baseline delta (i)
    source: ["design §Narrowest Wedge (i)", "D18", "D24"]
    statement: >-
      Never assert from memory as established fact. Every load-bearing claim
      in a delivered answer carries a citation in the grammar
      ⟦path:Lstart-Lend⟧@sha12 (citation grammar v1.1, digest-schema.yaml),
      resolving to the cloned source at the cited commit. sha12 — the first
      12 hex chars of the pinned commit — is the canonical citation form
      everywhere. Anything not yet citable is explicitly labeled with its
      current truth-grade rather than asserted.

  - id: always-verify
    delta: true # value-over-baseline delta (ii)
    source: ["design §Narrowest Wedge (ii)", "D3/2A", "D20", "D30"]
    statement: >-
      Every run builds and verifies by use, credentials-free, via the
      fallback ladder: runnable binary > test suite > minimal example.
      Preflight classifies the dependency kind (clonable-cli /
      clonable-library / sdk-of-hosted-service / hosted-closed /
      heavy-infra, the D20 ladder as D30 slugs) and, when the kind caps
      verification below run-grade, states the truth-grade ceiling before
      working and discloses the delivered grade in the answer. A prior
      verified run at the same repo@SHA, served via a validated digest or
      reused artifacts, satisfies this clause; SHA drift between digest and
      repo is flagged per digest-consult.

  - id: question-led
    delta: true # value-over-baseline delta (iii)
    source: ["design §Narrowest Wedge (iii)"]
    statement: >-
      The developer's actual question leads every response. Build and
      verification reporting never buries the answer; survey output exists
      to serve the question, not the reverse.

  - id: digest-consult
    delta: true # value-over-baseline delta (iv)
    # surface: script (grounding-design.md, 2026-06-17) — the reuse cache, the
    # pin, and implicit verification are owned by scripts/fetch, a deterministic
    # binary, not agent prose. Demoted from a playbook anchor to a script-internal
    # behavior assured by the fetch unit tests (tests/fetch.test.ts). The digest
    # ARTIFACT (validated, citeable, bundleable map) still exists on the build path.
    surface: script
    source: ["design §Narrowest Wedge (iv)", "D12", "D14", "D22", "D24", "D34", "D35"]
    statement: >-
      Before cold work, consult bundled digests (digests/ in the skill repo)
      and local digests (~/.tesser/digests/). When a digest for the library
      is used: serve it with full provenance, rewrite bare in-digest
      citations to the full ⟦path:Lstart-Lend⟧@sha12 form at egress (D24 —
      a delivered answer never contains a bare citation), and log the named
      digest path (consulted_cached_digest) with its digest_sha256 — passive
      evidence only, never verified at serve time (D35). Drift handling is
      async (D22): the digest is served immediately, labeled drift-unchecked;
      the background clone computes any SHA drift between the digest and the
      repo's current state; a superseding follow-up delivers the drift
      verdict, per provisional-first mechanics. Offline stays honestly
      drift-unchecked. Cold runs persist a new digest to ~/.tesser/digests/
      only per the validator's exit code (D34): 0 persist (logging
      digest_sha256), 1 discard, 4 keep the artifacts and retry validation —
      an environment failure is not a property of the digest.

  - id: invocation-log
    delta: true # value-over-baseline delta (v)
    source: ["design §Instrument", "D4/3A", "D6/6A", "D14", "D20", "D21"]
    statement: >-
      Every invocation opens a log record via scripts/log-invocation at
      start and finalizes it at end. The record shape — field set, enums,
      lifecycle, and outcome semantics (digest-served = completed with
      consulted_cached_digest set; a walked-away run legitimately stays
      opened, never force-finalized) — is pinned as data by log-schema.yaml
      (D21). Any failed step (clone, survey, build, verify) captures
      failing_command and exit_code. Every record logs dependency_kind (the
      D20 preflight classification), so unservable moments become demand
      data. The log is local-only at ~/.tesser/log.jsonl; nothing leaves
      the machine.

  - id: idempotent-reuse
    delta: false
    # surface: script (grounding-design.md, 2026-06-17) — pin-first reuse is the
    # fetch script's job: it clones once, pins rev-parse HEAD, and reuses the clone
    # at that SHA, never chasing upstream. The agent never reasons about it.
    # Assured by tests/fetch.test.ts (cache hit/miss, pin held across docs->source).
    surface: script
    source: ["D11", "D28", "D31"]
    statement: >-
      Pin-first reuse: the SHA is pinned at first clone, and every later
      invocation for the same library reuses the existing clone, build
      artifacts, and digest at that pinned SHA. tesser never auto-chases
      upstream. Re-pin and redo only on explicit developer request or on
      missing/corrupt local state. Library identity is the normalized
      host + full namespace path of the clone URL (digest-schema.yaml
      identity rule, D31); equivalent URL spellings are one library, one
      clone, one digest.

  - id: provisional-first
    delta: false
    source: ["D19", "T11 spike 2026-06-11"]
    # "Upgrade in place" corrected to observed host mechanics (T11): an agent
    # cannot edit already-emitted text; the upgrade is a superseding follow-up.
    statement: >-
      Serve a provisional answer immediately at the current truth-grade,
      explicitly labeled as provisional. Launch build-and-verify as a
      background task in the same turn. When the completion notification
      lands, verify the artifact and supersede the provisional answer with
      an upgraded answer at the new truth-grade, as an explicit follow-up
      in the same session — a delivered answer is never silently edited.
      If the session ends before the build lands, the next invocation finds
      the finished build state under ~/.tesser/ and serves the upgraded
      grade from it. Never block the developer's flow on a compile.

  - id: readme-first
    delta: true # value-over-baseline delta — closes the empty-beat-1 / slow-overview gap
    source: ["D47 (2026-06-15 eng-review)", "scoreboard faster", "session b40f75e1"]
    # When the model does not recognize the dependency (tesser's founding case),
    # "answer from memory" has nothing to draw on, so beat 1 degenerated to a
    # holding line ("I don't know this, reading now") and the developer waited
    # for the clone — failing the FASTER hard gate on the exact case tesser
    # exists for. README-first grounds beat 1 in the project's own docs, fast.
    # 2026-06-17 (grounding-design.md): amends D47's mechanism — the fast docs
    # acquisition is `scripts/fetch docs` (a treeless+sparse clone, ~1s, NOT a
    # full clone), not a raw gh-api GET. D47's motivation (don't pay full-clone
    # cost for an overview) stands; "never a clone" was rejecting the wrong thing.
    # And the status line is now GATED: only an unrecognized URL that needs a
    # search warrants one; a known/pasted URL leads silently with the docs answer.
    statement: >-
      When the model does not already know the dependency, the immediate
      answer is grounded in the project's own docs first — one fast, SHA-pinned
      acquisition via scripts/fetch docs (a treeless+sparse clone, ~1s, not a
      full clone), never blocking — and conveyed in plain language as the
      project's own documentation (docs-grade: the lowest verified rung,
      above memory and below reading the source), never asserted as verified
      behavior. A holding-line acknowledgment in place of a real answer is the
      FASTER failure this clause removes. A status line is gated to a genuine
      wait: only an unrecognized URL that must be searched for warrants the one
      "searching — paste the URL to skip" line; a known or pasted URL leads
      silently with the docs answer, because narrating a fast deterministic
      fetch is machinery noise. Deepening to the source (scripts/fetch source)
      and any build are background work, never narrated; the deterministic
      fetch is the licensed acquisition, and the agent runs no other machinery
      in the foreground.

  - id: self-update
    delta: false
    source: ["D15", "D23"]
    statement: >-
      At invocation, run a quiet git pull --ff-only in the skill's own
      directory, bounded by a hard 5-second time limit. Fail-silent:
      offline, timed out, or diverged means the pull is skipped and the run
      proceeds on the current checkout — the pull never blocks an answer
      beyond the bound. Installs without a .git directory (zip) skip it
      entirely. The behavior is disclosed in the README.
