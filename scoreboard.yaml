  #   forbidden_lexicon_final — SETTLED 2026-06-12 (D41): the FINAL list is digestible.checks.no_internal_lexicon_leak.forbidden_lexicon
  #                             above — the grade ladder (run/inspect/docs/truth-grade), provisional, cold run, digest,
  #                             citable knowledge, kind slug, "the skill", + raw citation markup. The scorer + the SKILL.md
  #                             sync gate (structure.test.ts) both pin against it. The post-dogfood revision pass remains the
  #                             one open lever (revision_trigger above), not a per-decision blocker.

